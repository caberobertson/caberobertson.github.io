name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Validate & smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate HTML
        run: npm run validate

      - name: Run smoke tests
        run: npm test
