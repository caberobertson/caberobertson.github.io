<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Cabe Robertson</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <nav>
        <div class="container">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="container page-section">
        <h2>Get In Touch</h2>
        <p class="section-subtitle">I am actively seeking internship/co-op roles for Summer & Fall 2026 / 2027.</p>
        
        <div class="contact-split">
            <!-- Left Info Side -->
            <div class="contact-info-panel">
                <div class="info-item">
                    <span class="icon">✉️</span>
                    <div>
                        <h4>Email</h4>
                        <a href="mailto:caberobertson@gmail.com">caberobertson@gmail.com</a>
                    </div>
                </div>
                <div class="info-item">
                    <span class="icon">📞</span>
                    <div>
                        <h4>Phone</h4>
                        <p>575-644-4703</p>
                    </div>
                </div>
                <div class="info-item">
                    <span class="icon">📍</span>
                    <div>
                        <h4>Location</h4>
                        <p>Las Cruces, NM</p>
                    </div>
                </div>
                <div class="info-item">
                    <span class="icon">💼</span>
                    <div>
                        <h4>LinkedIn</h4>
                        <a href="https://www.linkedin.com/in/caberobertson/" target="_blank">Connect with me</a>
                    </div>
                </div>
            </div>

            <!-- Right Form Side -->
            <div class="contact-form-panel card">
                <h3>Send a Message</h3>
                <!-- You can link this action to a free service like formspree.io later -->
                <form action="mailto:caberobertson@gmail.com" method="post" enctype="text/plain">
                    <div class="input-group">
                        <label>Name</label>
                        <input type="text" placeholder="John Doe" required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="johndoe@company.com" required>
                    </div>
                    <div class="input-group">
                        <label>Message</label>
                        <textarea rows="5" placeholder="Hello Cabe, I have an opportunity..." required></textarea>
                    </div>
                    <button type="submit" class="btn submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <script src="particles.js"></script>
</body>
</html>
